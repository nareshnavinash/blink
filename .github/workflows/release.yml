name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Create DMG
        run: |
          hdiutil create -volname "Blink" \
            -srcfolder build/macos/Build/Products/Release/blink_app.app \
            -ov -format UDZO \
            Blink-${{ github.ref_name }}-macos.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: Blink-*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libblkid-dev liblzma-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Create tarball
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../Blink-${{ github.ref_name }}-linux.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: Blink-*.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Create ZIP
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath Blink-${{ github.ref_name }}-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: Blink-*.zip

  create-release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            macos-dmg/*.dmg
            linux-tarball/*.tar.gz
            windows-zip/*.zip
          generate_release_notes: true
