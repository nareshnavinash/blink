<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Open Graph social sharing image (1200x630) -->

  <!-- Background -->
  <rect width="1200" height="630" fill="#2A1F3D"/>

  <!-- Layered C motif (left-center area) -->
  <!-- Layer 3 (back) -->
  <path d="M 420 267 A 120 120 0 1 0 420 363"
